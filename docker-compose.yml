services:
  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:web"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    volumes:
      - .:/workspace
    depends_on:
      - server

  server:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:server"
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/codedock
      JWT_SECRET: change-me
      CORS_ORIGIN: http://localhost:3000
      RUNNER_URL: http://runner:5000
    volumes:
      - .:/workspace
    depends_on:
      - mongo
      - runner

  runner:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:runner"
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      EXEC_TIMEOUT_MS: 5000
      MAX_OUTPUT_BYTES: 100000
      PYTHON_IMAGE: python:3.12-alpine
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
